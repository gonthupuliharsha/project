<!DOCTYPE html>
<html>

<head>

<title>Reset Password</title>

<style>

body{
font-family:Poppins;
background:#0f172a;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
color:white;
}

.box{
background:white;
color:black;
padding:40px;
border-radius:10px;
width:350px;
text-align:center;
}

input{
width:100%;
padding:10px;
margin:15px 0;
}

button{
padding:10px;
width:100%;
background:#38bdf8;
border:none;
color:white;
cursor:pointer;
}

.password-box{
position:relative;
}

.password-box span{
position:absolute;
right:10px;
top:12px;
cursor:pointer;
font-size:14px;
}

.back{
position:absolute;
top:20px;
left:20px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="back" onclick="goBack()">← </div>

<div class="box">

<h2>Reset Password</h2>

<p>Enter your new password</p>

<div class="password-box">
<input id="password" type="password" placeholder="New Password">
<span onclick="togglePassword()">👁</span>
</div>

<button onclick="resetPassword()">Reset Password</button>

</div>

<script>

function goBack(){
window.history.back()
}

function togglePassword(){

let pass=document.getElementById("password")

if(pass.type==="password"){
pass.type="text"
}
else{
pass.type="password"
}

}

function getToken(){

let params=new URLSearchParams(window.location.search)
return params.get("token")

}

function resetPassword(){

let password=document.getElementById("password").value
let token=getToken()

fetch("http://127.0.0.1:5000/reset_password",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
token:token,
password:password
})

})

.then(res=>res.json())

.then(data=>{
alert(data.message)
})

}

</script>

</body>

</html>
