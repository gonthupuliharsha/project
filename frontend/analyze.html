<!DOCTYPE html>
<html>

<head>

<title>Analyze Facility Location</title>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/@turf/turf@6/turf.min.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
height:100vh;
background:
linear-gradient(rgba(0,0,0,0.75),rgba(0,0,0,0.75)),
url("https://images.unsplash.com/photo-1480714378408-67cf0d13bc1b");
background-size:cover;
background-position:center;
color:white;
}

.header{
position:absolute;
top:0;
left:0;
width:100%;
height:60px;
display:flex;
align-items:center;
justify-content:center;
background:rgba(0,0,0,0.5);
backdrop-filter:blur(8px);
z-index:1000;
}

.back-btn{
position:absolute;
left:20px;
font-size:22px;
cursor:pointer;
padding:5px 10px;
border-radius:6px;
}

.back-btn:hover{
background:rgba(255,255,255,0.2);
}

.title{
font-size:18px;
font-weight:600;
letter-spacing:1px;
}

.main{
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
height:100vh;
}

.options{
display:flex;
gap:30px;
}

.card{
background:white;
color:black;
padding:30px;
border-radius:12px;
width:260px;
text-align:center;
cursor:pointer;
}

.card:hover{
transform:translateY(-5px);
}

.card button{
margin-top:15px;
padding:10px;
width:100%;
background:#38bdf8;
border:none;
color:white;
border-radius:5px;
cursor:pointer;
}

/* ✅ FIXED */
.container{
display:none;
flex-direction:row;  /* IMPORTANT FIX */
height:100vh;
margin-top:60px;
}

#sidebar{
width:320px;
background:rgba(0,0,0,0.6);
padding:20px;
backdrop-filter:blur(10px);
}

#sidebar input,
#sidebar select{
width:100%;
padding:10px;
margin-bottom:10px;
border:none;
border-radius:5px;
}

#sidebar button{
width:100%;
padding:12px;
background:#38bdf8;
border:none;
color:white;
border-radius:5px;
cursor:pointer;
}

#errorMsg{
color:#ff6b6b;
margin-bottom:10px;
}

#result{
margin-top:10px;
padding:10px;
background:#1e293b;
border-radius:5px;
max-height:250px;
overflow:auto;
}

#map{
flex:1;
display:none;
}

</style>

</head>

<body>

<div class="header">
<div class="back-btn" onclick="handleBack()">←</div>
<div class="title">Analyze Facility</div>
</div>

<div class="main" id="choiceScreen">

<div class="options">

<div class="card">
<h3>✍️ Manual Input</h3>
<p>Enter latitude & longitude manually</p>
<button onclick="showManual()">Continue</button>
</div>

<div class="card">
<h3>🗺️ Map Selection</h3>
<p>Click on map to choose location</p>
<button onclick="showMapMode()">Continue</button>
</div>

</div>

</div>

<div class="container" id="analyzeScreen">

<div id="sidebar">

<div id="errorMsg"></div>

<h3>Enter Details</h3>

<input id="lat" placeholder="Latitude">
<input id="lng" placeholder="Longitude">

<select id="facility">
<option value="hospital">Hospital</option>
<option value="school">School/College</option>
<option value="restaurant">Restaurant</option>
<option value="pharmacy">Pharmacy</option>
<option value="clinic">Clinic</option>
<option value="pg">PG</option>
</select>

<button onclick="validateAndAnalyze()">Analyze</button>

<div id="result">Enter details and analyze</div>

</div>

<div id="map"></div>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<!-- ⚠️ CHECK THIS PATH -->
<script src="js/analysis.js"></script>
<script>
console.log("HTML JS Loaded ✅");
</script>
<script>

let currentScreen = "choice";

function handleBack(){
if(currentScreen === "choice"){
window.location.href = "dashboard.html";
}else{
document.getElementById("analyzeScreen").style.display="none";
document.getElementById("choiceScreen").style.display="flex";
document.getElementById("map").style.display="none";
currentScreen = "choice";
}
}

/* ✅ DEBUG ADDED */
function showManual(){
console.log("Manual clicked");

document.getElementById("choiceScreen").style.display="none";
document.getElementById("analyzeScreen").style.display="flex";
currentScreen = "analyze";
}

function showMapMode(){
console.log("Map clicked");

document.getElementById("choiceScreen").style.display="none";
document.getElementById("analyzeScreen").style.display="flex";
document.getElementById("map").style.display="block";
currentScreen = "analyze";

/* ✅ SAFE INIT */
setTimeout(()=>{
if(typeof initMap === "function"){
initMap();
}else{
console.log("❌ initMap not loaded → check analysis.js path");
}
},200);
}

/* POLYGON */
const vizagBoundary = {
"type": "Feature",
"geometry": {
"type": "Polygon",
"coordinates": [[
[83.20,17.65],
[83.25,17.67],
[83.30,17.68],
[83.33,17.70],
[83.35,17.75],
[83.34,17.78],
[83.30,17.80],
[83.25,17.79],
[83.22,17.76],
[83.20,17.72],
[83.20,17.65]
]]
}
};

function isInsidePolygon(lat, lng) {
return turf.booleanPointInPolygon(
turf.point([lng, lat]),
vizagBoundary
);
}

function validateAndAnalyze(){

let lat = parseFloat(document.getElementById("lat").value);
let lng = parseFloat(document.getElementById("lng").value);

if(isNaN(lat) || isNaN(lng)){
document.getElementById("errorMsg").innerText = "❌ Enter valid numbers";
return;
}

if(!isInsidePolygon(lat,lng)){
document.getElementById("errorMsg").innerText =
"❌ Only Visakhapatnam area allowed";
return;
}

document.getElementById("errorMsg").innerText = "";

analyze();
}

</script>

</body>
</html>
