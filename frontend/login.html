<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login | Urban Planner</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
height:100vh;
background:
linear-gradient(rgba(0,0,0,0.7),rgba(0,0,0,0.7)),
url("https://images.unsplash.com/photo-1480714378408-67cf0d13bc1b");
background-size:cover;
background-position:center;
display:flex;
align-items:center;
justify-content:center;
}

/* BACK BUTTON */
.back-btn{
position:absolute;
top:20px;
left:20px;
color:white;
font-size:18px;
cursor:pointer;
}

.login-container{
background:white;
padding:40px;
width:350px;
border-radius:10px;
box-shadow:0 10px 25px rgba(0,0,0,0.4);
text-align:center;
}

.login-container h2{
margin-bottom:20px;
}

.input-box{
position:relative;
margin-bottom:20px;
}

.input-box input{
width:100%;
padding:12px 40px;
border:1px solid #ccc;
border-radius:5px;
}

.input-box i.left{
position:absolute;
left:12px;
top:12px;
}

.input-box i.right{
position:absolute;
right:12px;
top:12px;
cursor:pointer;
}

button{
width:100%;
padding:12px;
background:#38bdf8;
border:none;
color:white;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#0284c7;
}

.links{
display:flex;
justify-content:space-between;
margin-top:10px;
font-size:14px;
}

.links a{
text-decoration:none;
color:#38bdf8;
}

/* 🔄 Spinner Animation */
@keyframes spin {
0% { transform: rotate(0deg); }
100% { transform: rotate(360deg); }
}

</style>

</head>

<body>

<div class="back-btn" onclick="goHome()">← </div>

<div class="login-container">

<h2>Login</h2>

<div class="input-box">
<i class="fa fa-envelope left"></i>
<input type="email" id="email" placeholder="Enter Email">
</div>

<div class="input-box">
<i class="fa fa-lock left"></i>
<input type="password" id="password" placeholder="Enter Password">
<i class="fa fa-eye right" onclick="togglePassword()"></i>
</div>

<button onclick="login()">Login</button>

<!-- ✅ MESSAGE AREA -->
<div id="loginMsg" style="margin-top:15px; font-size:14px;"></div>

<div class="links">
<a href="signup.html">Create account</a>
<a href="forgot_password.html">Forgot Password?</a>
</div>

</div>

<script>

function goHome(){
window.location.href="index.html";
}

function togglePassword(){
let pass=document.getElementById("password");

if(pass.type==="password"){
pass.type="text";
}else{
pass.type="password";
}
}

function login(){

const user={
email:document.getElementById("email").value,
password:document.getElementById("password").value
}

fetch("http://127.0.0.1:5000/login",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify(user)
})
.then(res=>res.json())
.then(data=>{

let msgBox = document.getElementById("loginMsg");

/* ❌ LOGIN FAILED */
if(data.message && !data.message.toLowerCase().includes("success")){
msgBox.style.color = "red";
msgBox.innerText = data.message;
return;
}

/* ✅ LOGIN SUCCESS */

// Clear old message
msgBox.innerHTML = "";

/* 🔄 Create spinner container */
let container = document.createElement("div");
container.style.display = "flex";
container.style.alignItems = "center";
container.style.justifyContent = "center";
container.style.gap = "10px";

/* 🔄 Spinner */
let spinner = document.createElement("div");
spinner.style.width = "18px";
spinner.style.height = "18px";
spinner.style.border = "3px solid #ccc";
spinner.style.borderTop = "3px solid #38bdf8";
spinner.style.borderRadius = "50%";
spinner.style.animation = "spin 1s linear infinite";

/* 📝 Text */
let text = document.createElement("span");
text.innerText = "Login successful... Redirecting to dashboard";
text.style.color = "green";

/* Append */
container.appendChild(spinner);
container.appendChild(text);
msgBox.appendChild(container);

/* ⏳ Redirect after 1 second */
setTimeout(()=>{
window.location.href = "dashboard.html";
},1000);

})
.catch(error=>{
console.log("Error:", error);
});
}

</script>

</body>
</html>
