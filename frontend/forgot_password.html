<!DOCTYPE html>
<html>
<head>
<title>Forgot Password</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
height:100vh;
background:
linear-gradient(rgba(0,0,0,0.7),rgba(0,0,0,0.7)),
url("https://images.unsplash.com/photo-1480714378408-67cf0d13bc1b");

/* ✅ FIXED SAME AS LOGIN PAGE */
background-size:cover;
background-position:center;
background-repeat:no-repeat;

display:flex;
justify-content:center;
align-items:center;
color:white;
}

/* BACK BUTTON */
.back-btn{
position:absolute;
top:20px;
left:20px;
color:white;
font-size:18px;
cursor:pointer;
}

.box{
background:white;
color:black;
padding:40px;
border-radius:10px;
width:350px;
text-align:center;
box-shadow:0 10px 25px rgba(0,0,0,0.4); /* ✅ same shadow */
}

.box h2{
margin-bottom:15px;
}

.box p{
font-size:14px;
margin-bottom:10px;
}

input{
width:100%;
padding:12px;
margin:15px 0;
border:1px solid #ccc;
border-radius:5px;
}

button{
padding:12px;
width:100%;
background:#38bdf8;
border:none;
color:white;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#0284c7;
}

</style>
</head>

<body>

<div class="back-btn" onclick="goHome()">← </div>

<div class="box">

<h2>Forgot Password</h2>

<p>Enter your email to receive reset link</p>

<input id="email" placeholder="Enter Email">

<button onclick="sendLink()">Send Reset Link</button>

</div>

<script>

function goHome(){
window.location.href="login.html";
}

function sendLink(){

let email=document.getElementById("email").value;

fetch("http://127.0.0.1:5000/forgot_password",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({email:email})
})
.then(res=>res.json())
.then(data=>{
alert(data.message)
})

}

</script>

</body>
</html>
