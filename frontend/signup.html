<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Signup | Urban Planner</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
height:100vh;
background:
linear-gradient(rgba(0,0,0,0.7),rgba(0,0,0,0.7)),
url("https://images.unsplash.com/photo-1480714378408-67cf0d13bc1b");
background-size:cover;
background-position:center;
display:flex;
align-items:center;
justify-content:center;
}

input.error{
border:1px solid red;
}

@keyframes spin {
0% { transform: rotate(0deg); }
100% { transform: rotate(360deg); }
}
.back-btn{
position:absolute;
top:20px;
left:20px;
color:white;
font-size:18px;
cursor:pointer;
}

.container{
display:flex;
gap:80px;
color:white;
align-items:center;
}

.info-section{
max-width:450px;
}

.signup-container{
background:white;
padding:40px;
width:360px;
border-radius:10px;
box-shadow:0 10px 25px rgba(0,0,0,0.4);
text-align:center;
}

.input-box{
position:relative;
margin-bottom:15px;
}

.input-box input{
width:100%;
padding:12px 45px 12px 40px;
border:1px solid #ccc;
border-radius:5px;
}

.input-box i.left{
position:absolute;
left:12px;
top:50%;
transform:translateY(-50%);
color:#555;
}

.input-box i.right{
position:absolute;
right:12px;
top:50%;
transform:translateY(-50%);
cursor:pointer;
color:#555;
}

.rules{
text-align:left;
font-size:13px;
margin-bottom:15px;
}

.rules li{
list-style:none;
margin-bottom:5px;
color:red;
}

.rules li.valid{
color:green;
}

button{
width:100%;
padding:12px;
border:none;
background:#38bdf8;
color:white;
font-size:16px;
border-radius:5px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="back-btn" onclick="goHome()">← </div>

<div class="container">

<div class="info-section">
<h1>Create Your Account</h1>
<p>Signup to access AI powered smart city planning tools.</p>
</div>

<div class="signup-container">

<h2>Create Account</h2>

<div class="input-box">
<i class="fa-solid fa-user left"></i>
<input id="name" placeholder="Enter Name">
</div>

<div class="input-box">
<i class="fa-solid fa-envelope left"></i>
<input id="email" type="email" placeholder="Enter Email" disabled>
<p id="emailError" style="color:red; font-size:13px; text-align:left; margin-top:5px; display:none;">
Email already registered
</p>
</div>

<div class="input-box">
<i class="fa-solid fa-lock left"></i>
<input id="password" type="password" placeholder="Enter Password" disabled>
<i class="fa-solid fa-eye right" onclick="togglePassword('password')"></i>
</div>

<ul class="rules" id="password-rules">
<li id="length">❌ At least 8 characters</li>
<li id="uppercase">❌ One uppercase letter</li>
<li id="lowercase">❌ One lowercase letter</li>
<li id="number">❌ One number</li>
<li id="symbol">❌ One special character</li>
</ul>

<div class="input-box">
<i class="fa-solid fa-lock left"></i>
<input id="confirmPassword" type="password" placeholder="Confirm Password" disabled>
<i class="fa-solid fa-eye right" onclick="togglePassword('confirmPassword')"></i>
</div>

<button onclick="signup()">Signup</button>

<p style="margin-top:10px; font-size:14px; color:#333;">
Already have an account? 
<a href="login.html" style="color:#38bdf8;text-decoration:none;font-weight:500;">Login here</a>
</p>

</div>

</div>

<script>

function goHome(){
window.location.href="index.html";
}

function togglePassword(id){
let input=document.getElementById(id)
input.type="text"

setTimeout(()=>{
input.type="password"
},1000)
}

/* 🔥 STEP FLOW */

// Name → Email
document.getElementById("name").addEventListener("input", function(){
let nameVal = this.value.trim();
document.getElementById("email").disabled = nameVal.length === 0;
});

// Email → Password
document.getElementById("email").addEventListener("input", function(){
let emailVal = this.value.trim();
let emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
document.getElementById("password").disabled = !emailRegex.test(emailVal);
});

// Password → Confirm Password
document.getElementById("password").addEventListener("input", function(){
let passwordVal = this.value;
document.getElementById("confirmPassword").disabled = passwordVal.length < 8;
});

/* PASSWORD RULES */
document.getElementById("password").addEventListener("input", validateRules);

function validateRules(){
let password = document.getElementById("password").value;

let rules = {
length: password.length >= 8,
uppercase: /[A-Z]/.test(password),
lowercase: /[a-z]/.test(password),
number: /[0-9]/.test(password),
symbol: /[@$!%*?&]/.test(password)
};

for(let key in rules){
let element = document.getElementById(key);
if(rules[key]){
element.classList.add("valid");
element.innerHTML = "✔ " + element.innerText.substring(2);
}else{
element.classList.remove("valid");
element.innerHTML = "❌ " + element.innerText.substring(2);
}
}
}

function signup(){

let nameVal = document.getElementById("name").value.trim();
let emailVal = document.getElementById("email").value.trim();
let password = document.getElementById("password").value;
let confirmPassword = document.getElementById("confirmPassword").value;

if(!nameVal || !emailVal || !password || !confirmPassword){
alert("All fields are required ❌");
return;
}

let emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
if(!emailRegex.test(emailVal)){
alert("Enter a valid email ❌");
return;
}

let regex = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&]).{8,}$/;

if(!regex.test(password)){
alert("Password must follow all rules ❌");
return;
}

if(password !== confirmPassword){
alert("Passwords do not match ❌");
return;
}

fetch("http://127.0.0.1:5000/signup",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
name:nameVal,
email:emailVal,
password:password
})
})
.then(res=>res.json())
.then(data=>{

console.log("FULL RESPONSE:", data); // 🔍 IMPORTANT

// ❌ EMAIL ALREADY EXISTS
if(data.message && data.message.includes("already")){

let emailInput = document.getElementById("email");
let errorText = document.getElementById("emailError");

emailInput.classList.add("error");
errorText.style.display = "block";

setTimeout(()=>{
window.location.href="login.html";
},500);

return;
}
/* ✅ SUCCESS MESSAGE + REDIRECT */

// Create success message dynamically
/* ✅ REMOVE OLD MESSAGE IF EXISTS */
let oldMsg = document.getElementById("successMsg");
if(oldMsg) oldMsg.remove();

/* ✅ CREATE LOADING CONTAINER */
let successMsg = document.createElement("div");
successMsg.id = "successMsg";
successMsg.style.display = "flex";
successMsg.style.alignItems = "center";
successMsg.style.justifyContent = "center";
successMsg.style.gap = "10px";
successMsg.style.marginTop = "15px";

/* 🔄 SPINNER */
let spinner = document.createElement("div");
spinner.style.width = "18px";
spinner.style.height = "18px";
spinner.style.border = "3px solid #ccc";
spinner.style.borderTop = "3px solid #38bdf8";
spinner.style.borderRadius = "50%";
spinner.style.animation = "spin 1s linear infinite";

/* 📝 TEXT */
let text = document.createElement("span");
text.innerText = "Signing up... Redirecting to dashboard";
text.style.color = "green";
text.style.fontSize = "14px";

/* APPEND */
successMsg.appendChild(spinner);
successMsg.appendChild(text);

document.querySelector(".signup-container").appendChild(successMsg);
// ✅ SUCCESS → ALWAYS REDIRECT

if(data.message){
window.location.href = "dashboard.html";
}

})
.catch(error=>{
console.log("FETCH ERROR:", error);
});
}

document.getElementById("email").addEventListener("input", function(){
this.classList.remove("error");
document.getElementById("emailError").style.display = "none";
});

</script>

</body>
</html>
